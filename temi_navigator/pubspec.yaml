name: temi_navigator
description: Temi Robot Exhibition Navigator App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^2.0.3+1   # 소켓 통신
  provider: ^6.1.1              # 상태 관리
  http: ^1.1.0                  # REST API
  shared_preferences: ^2.2.2    # 로컬 저장 (user_id)
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/          # 나중에 맵 이미지 여기에 추가
