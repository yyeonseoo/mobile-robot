# 개발용: Maven 복사 없이 저장한 CSS·JS·이미지가 바로 서빙되도록
# (Run 작업 디렉터리가 stamp-rally-server 모듈 루트일 때만 file 경로가 유효합니다.)
spring.web.resources.static-locations=file:./src/main/resources/static/,classpath:/static/

# 로컬 비밀값 — stamp-rally-server/.env (Git 제외, .env.example 참고)
# 모듈 루트 또는 저장소 루트에서 실행해도 읽히도록 두 경로 모두 시도
spring.config.import=optional:file:.env[.properties],optional:file:./stamp-rally-server/.env[.properties]
