<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>스탬프 랠리</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --accent: #38bdf8;
        --ok: #34d399;
        --text: #f1f5f9;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 1rem;
        min-height: 100dvh;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        color: #94a3b8;
        margin-bottom: 0.25rem;
      }
      input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: var(--text);
        margin-bottom: 0.75rem;
      }
      button {
        width: 100%;
        padding: 0.85rem;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        margin-bottom: 0.5rem;
      }
      .btn-primary {
        background: var(--accent);
        color: #0f172a;
      }
      .btn-secondary {
        background: var(--card);
        color: var(--text);
        border: 1px solid #475569;
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .stamp-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .stamp-list li {
        padding: 0.65rem 0;
        border-bottom: 1px solid #334155;
      }
      .stamp-list li:last-child {
        border-bottom: none;
      }
      .muted {
        font-size: 0.8rem;
        color: #94a3b8;
      }
      .msg {
        font-size: 0.9rem;
        margin: 0.5rem 0;
      }
      .ok {
        color: var(--ok);
      }
    </style>
  </head>
  <body>
    <h1>스탬프 랠리 (레거시)</h1>
    <p class="muted">
      새 화면:
      <a href="/mobile/index.html" style="color: var(--accent)">/mobile/index.html</a>
      에서 QR 연동·코드 적립·완료 UI를 사용하세요. 아래는 예전 수동 URL 입력 화면입니다.
    </p>

    <div class="card">
      <label for="baseUrl">서버 URL (예: http://192.168.0.10:8080)</label>
      <input id="baseUrl" type="url" placeholder="http://localhost:8080" autocomplete="off" />
      <button type="button" class="btn-secondary" id="btnSaveUrl">주소 저장</button>
    </div>

    <div class="card">
      <button type="button" class="btn-primary" id="btnJoin">참가하기 (세션 발급)</button>
      <p class="muted" id="tokenDisplay">토큰: 없음</p>
    </div>

    <div class="card">
      <button type="button" class="btn-primary" id="btnSendLoc">현재 위치로 스탬프 확인</button>
      <p class="msg" id="locMsg"></p>
    </div>

    <div class="card">
      <button type="button" class="btn-secondary" id="btnRefresh">내 스탬프 새로고침</button>
      <ul class="stamp-list" id="stampList"></ul>
    </div>

    <script>
      (function () {
        var BASE_KEY = "stampRallyBaseUrl";
        var TOKEN_KEY = "stampRallyVisitorToken";

        var baseInput = document.getElementById("baseUrl");
        var tokenDisplay = document.getElementById("tokenDisplay");
        var locMsg = document.getElementById("locMsg");
        var stampList = document.getElementById("stampList");

        function base() {
          var u = (baseInput.value || "").replace(/\/$/, "");
          return u || "http://localhost:8080";
        }

        function token() {
          return localStorage.getItem(TOKEN_KEY) || "";
        }

        function showToken() {
          var t = token();
          tokenDisplay.textContent = t ? "토큰: " + t : "토큰: 없음";
        }

        baseInput.value = localStorage.getItem(BASE_KEY) || "";
        showToken();

        document.getElementById("btnSaveUrl").onclick = function () {
          localStorage.setItem(BASE_KEY, baseInput.value.trim());
          alert("저장했습니다.");
        };

        document.getElementById("btnJoin").onclick = function () {
          localStorage.setItem(BASE_KEY, baseInput.value.trim());
          fetch(base() + "/api/sessions", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          })
            .then(function (r) {
              if (!r.ok) throw new Error("세션 실패 " + r.status);
              return r.json();
            })
            .then(function (data) {
              localStorage.setItem(TOKEN_KEY, data.visitorToken);
              showToken();
              refreshStamps();
            })
            .catch(function (e) {
              alert(e.message);
            });
        };

        function refreshStamps() {
          var t = token();
          if (!t) {
            stampList.innerHTML = "";
            return;
          }
          fetch(base() + "/api/my-stamps", {
            headers: { "X-Visitor-Token": t },
          })
            .then(function (r) {
              if (!r.ok) throw new Error("조회 실패 " + r.status);
              return r.json();
            })
            .then(function (items) {
              stampList.innerHTML = "";
              if (!items.length) {
                stampList.innerHTML = '<li class="muted">아직 모은 스탬프가 없습니다.</li>';
                return;
              }
              items.forEach(function (s) {
                var li = document.createElement("li");
                li.innerHTML =
                  "<strong>" +
                  s.spotName +
                  "</strong> <span class='muted'>(" +
                  s.spotCode +
                  ")</span><br><span class='muted'>" +
                  s.collectedAt +
                  "</span>";
                stampList.appendChild(li);
              });
            })
            .catch(function (e) {
              stampList.innerHTML = "<li class='muted'>" + e.message + "</li>";
            });
        }

        document.getElementById("btnRefresh").onclick = refreshStamps;

        document.getElementById("btnSendLoc").onclick = function () {
          var t = token();
          if (!t) {
            locMsg.textContent = "먼저 참가하기로 토큰을 발급받으세요.";
            return;
          }
          locMsg.textContent = "위치 가져오는 중…";
          if (!navigator.geolocation) {
            locMsg.textContent = "이 브라우저는 위치를 지원하지 않습니다.";
            return;
          }
          navigator.geolocation.getCurrentPosition(
            function (pos) {
              var lat = pos.coords.latitude;
              var lng = pos.coords.longitude;
              fetch(base() + "/api/location", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "X-Visitor-Token": t,
                },
                body: JSON.stringify({ latitude: lat, longitude: lng }),
              })
                .then(function (r) {
                  if (!r.ok) throw new Error("전송 실패 " + r.status);
                  return r.json();
                })
                .then(function (data) {
                  var n = data.newlyCollected.length;
                  locMsg.innerHTML =
                    n > 0
                      ? "<span class='ok'>새 스탬프 " + n + "개 획득!</span> (총 " + data.totalCollectedCount + "개)"
                      : "이번에 새로 받은 스탬프는 없습니다. (총 " + data.totalCollectedCount + "개)";
                  refreshStamps();
                })
                .catch(function (e) {
                  locMsg.textContent = e.message;
                });
            },
            function () {
              locMsg.textContent = "위치 권한을 허용해 주세요.";
            },
            { enableHighAccuracy: true, timeout: 15000 }
          );
        };

        refreshStamps();
      })();
    </script>
  </body>
</html>
