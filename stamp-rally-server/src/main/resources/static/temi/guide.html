<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1200" />
    <title>전시장 안내</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  </head>
  <body>
    <div class="stage">
      <header class="top-bar">
        <div>
          <h1>어디로 안내해드릴까요?</h1>
          <p class="muted">구역을 선택하면 상세 화면으로 이동합니다.</p>
        </div>
        <a class="back-link" href="index.html">← 메인</a>
      </header>

      <div class="screen-body" style="gap: 20px">
        <div style="display: flex; gap: 16px; flex-wrap: wrap">
          <button type="button" class="voice-btn" style="min-width: 240px; min-height: 64px; font-size: 1.05rem" id="btnNear">
            현재 위치 기준 찾기 (데모)
          </button>
          <button type="button" class="voice-btn" style="min-width: 240px; min-height: 64px; font-size: 1.05rem" id="btnAllMap">
            전체 지도 보기 (데모)
          </button>
        </div>
        <div class="zone-cards" id="zoneCards"></div>
        <div class="qr-panel">
          <div class="qr-host"><div id="qrPhone"></div></div>
          <div class="hint">
            <strong>폰으로 이어서 보기</strong><br />
            QR을 스캔하면 모바일에서 검색·상세·길안내를 이어갈 수 있습니다.
          </div>
        </div>
      </div>
    </div>
    <script>
      function origin() {
        return location.origin;
      }
      function renderQr() {
        var host = document.getElementById("qrPhone");
        host.innerHTML = "";
        if (window.QRCode) {
          new QRCode(host, {
            text: origin() + "/mobile/guide.html",
            width: 200,
            height: 200,
          });
        }
      }
      fetch(origin() + "/api/exhibitions")
        .then(function (r) {
          return r.json();
        })
        .then(function (rows) {
          var box = document.getElementById("zoneCards");
          box.innerHTML = "";
          rows.forEach(function (ex) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "zone-card";
            b.innerHTML =
              "<h2>" +
              ex.name +
              "</h2><p>" +
              ex.zone +
              " · " +
              ex.locationText +
              "</p>";
            b.onclick = function () {
              location.href = "guide-detail.html?id=" + ex.id;
            };
            box.appendChild(b);
          });
        })
        .catch(function () {
          document.getElementById("zoneCards").textContent =
            "전시 정보를 불러오지 못했습니다. 서버가 실행 중인지 확인하세요.";
        });
      window.addEventListener("load", function () {
        renderQr();
      });
      document.getElementById("btnNear").onclick = function () {
        alert("데모: 실제 구현 시 테미 위치와 전시 좌표를 비교해 가까운 순으로 정렬합니다.");
      };
      document.getElementById("btnAllMap").onclick = function () {
        alert("데모: 실제 구현 시 지도 이미지 또는 평면도 뷰어로 연결합니다.");
      };
    </script>
  </body>
</html>
