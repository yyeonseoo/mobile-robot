<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>포토부스 촬영 | 포켓몬 페스티벌</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home-landing.css" />
    <link rel="stylesheet" href="photo-capture-page.css" />
    <script src="js/i18n.js" defer></script>
  </head>
  <body class="temi-landing temi-photo-capture">
    <header class="tl-header">
      <a class="tl-brand" href="index.html">Pokemon Exhibition</a>
      <nav class="tl-nav" aria-label="주요 메뉴">
        <a href="rally-qr.html">Stamp Rally</a>
        <a href="guide.html">Map</a>
        <a href="photo-intro.html" class="is-active">Photo Booth</a>
        <a href="events.html">Events</a>
      </nav>
      <div class="tl-header-actions">
        <button type="button" class="tl-icon-btn" id="btnNotify" aria-label="알림">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <a class="tl-icon-btn" href="index.html" aria-label="메인으로">
          <span class="material-symbols-outlined">home</span>
        </a>
      </div>
    </header>

    <main class="temi-scroll pb-capture-main">
      <section class="pb-camera-stage" id="cameraView" aria-label="카메라 촬영">
        <div class="pb-viewport">
          <video id="cam" playsinline autoplay muted aria-label="카메라 미리보기"></video>

          <img
            id="nativePreview"
            alt="Temi 카메라 미리보기"
            hidden
            style="
              position: absolute;
              inset: 0;
              width: 100%;
              height: 100%;
              object-fit: cover;
              z-index: 1;
              transform: rotate(180deg);
              background: #111;
            "
          />

          <div
            id="nativeCameraNotice"
            hidden
            style="
              position: absolute;
              inset: 80px 80px 80px 80px;
              display: flex;
              align-items: center;
              justify-content: center;
              text-align: center;
              border: 4px dashed rgba(255, 255, 255, 0.8);
              border-radius: 32px;
              color: #ffffff;
              font-size: 34px;
              font-weight: 800;
              background: rgba(0, 0, 0, 0.25);
              z-index: 4;
            "
          >
            Temi 네이티브 카메라 준비 중입니다<br />
            잠시만 기다려 주세요
          </div>

          <img id="frameOverlay" class="pb-frame-overlay" alt="" />
          <!-- 장식(둥둥 떠다니는 요소) 제거 -->
          <div class="pb-hud">
            <div>
              <span class="pb-live-badge">
                <span class="pb-live-dot"></span>
                LIVE
              </span>
            </div>
            <span class="pb-res-badge">1920 × 1200</span>
          </div>
          <div class="pb-flash" id="flash" aria-hidden="true"></div>
        </div>

        <aside class="pb-filters" aria-label="프레임 선택">
          <h3 data-i18n="capture.filters">프레임 선택</h3>
          <div class="pb-filter-list" id="filterList"></div>
        </aside>

        <div class="pb-shutter-wrap">
          <div class="pb-shutter-ring" aria-hidden="true"></div>
          <button type="button" class="pb-shutter-btn" id="shutter" disabled aria-label="촬영">
            <span class="pb-shutter-inner"></span>
          </button>
          <p class="pb-shutter-hint" id="shutterHint" data-i18n="capture.hint.pick">
            프레임을 선택한 뒤 버튼을 눌러 촬영하세요!
          </p>
        </div>
      </section>

      <section class="pb-result" id="resultView" aria-label="촬영 결과" hidden>
        <div class="pb-result-card">
          <div class="pb-result-photo">
            <div class="pb-photo-frame">
              <img id="capturedImg" alt="촬영된 사진" />
              <span class="pb-frame-badge" id="frameBadge">PIKACHU EDITION</span>
            </div>
          </div>
          <div class="pb-result-side">
            <h2 data-i18n="capture.result.title">멋진 사진이네요!</h2>
            <p id="qrHint" data-i18n-br="capture.result.qr">
              아래 QR 코드를 스캔하여<br />휴대폰으로 사진을 받아보세요.
            </p>
            <p class="pb-uploading" id="uploadStatus" hidden data-i18n="capture.uploading">업로드 중…</p>
            <div class="pb-qr-wrap">
              <img id="qrImg" width="240" height="240" alt="사진 받기 QR" hidden />
              <span class="pb-qr-hit">HIT</span>
            </div>
            <div class="pb-result-actions">
              <button type="button" class="pb-btn-retake" id="btnRetake">
                <span class="material-symbols-outlined">refresh</span>
                <span data-i18n="capture.result.retake">다시 촬영하기</span>
              </button>
              <a class="pb-btn-home" href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span data-i18n="capture.result.home">처음으로 돌아가기</span>
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="temi-shell-footer pb-help-footer">
      <div class="help-text">
        <span class="material-symbols-outlined">info</span>
        <span data-i18n="help.text">도움이 필요하신가요? 옆에 있는 스태프에게 문의해 주세요.</span>
      </div>
      <div class="pb-lang-btns">
        <button type="button" class="is-active" id="btnLangKo">KOREAN</button>
        <button type="button" class="is-muted" id="btnLangEn">ENGLISH</button>
      </div>
    </footer>

    <canvas id="work" width="1600" height="900" hidden></canvas>

    <script>
      (function () {
        var video = document.getElementById("cam");
        var nativePreview = document.getElementById("nativePreview");
        var frameOverlay = document.getElementById("frameOverlay");
        var work = document.getElementById("work");
        var ctx = work.getContext("2d");
        var shutter = document.getElementById("shutter");
        var flash = document.getElementById("flash");
        var resultView = document.getElementById("resultView");
        var capturedImg = document.getElementById("capturedImg");
        var qrImg = document.getElementById("qrImg");
        var frameBadge = document.getElementById("frameBadge");
        var uploadStatus = document.getElementById("uploadStatus");
        var nativeCameraNotice = document.getElementById("nativeCameraNotice");
        var previewUrl = null;

        var filters = [
          {
            id: "eevee",
            label: "루주라",
            badge: "PHOTO FRAME 1",
            src: "/mobile/app/filters/filter_overlay1.png",
          },
          {
            id: "pikachu",
            label: "파이리",
            badge: "PHOTO FRAME 2",
            src: "/mobile/app/filters/filter_overlay2.png",
          },
          {
            id: "snorlax",
            label: "잠만보",
            badge: "PHOTO FRAME 3",
            src: "/mobile/app/filters/filter_overlay3.png",
          },
        ];

        var state = {
          filter: null,
          filterPicked: false,
          nativeCamera: false,
          busy: false,
          nativePreviewReady: false,
          webCameraReady: false,
          fourCutActive: false,
          fourCutShots: [],
          fourCutIndex: 0,
        };

        function isEnglish() {
          return window.TemiI18n && window.TemiI18n.getLang && window.TemiI18n.getLang() === "en";
        }

        function hasNativeCameraBridge() {
          return !!(window.TemiBridge && typeof window.TemiBridge.takePhoto === "function");
        }

        function hasNativePreviewBridge() {
          return !!(window.TemiBridge && typeof window.TemiBridge.startCameraPreview === "function");
        }

        function showNativeNotice(message) {
          nativeCameraNotice.innerHTML = message;
          nativeCameraNotice.hidden = false;
          nativeCameraNotice.style.display = "flex";
        }

        function hideNativeNotice() {
          nativeCameraNotice.hidden = true;
          nativeCameraNotice.style.display = "none";
        }

        function drawVideoFrame() {
          var w = work.width;
          var h = work.height;
          ctx.fillStyle = "#111";
          ctx.fillRect(0, 0, w, h);

          if (!video.videoWidth) return false;

          var vw = video.videoWidth;
          var vh = video.videoHeight;
          var scale = Math.max(w / vw, h / vh);
          var dw = vw * scale;
          var dh = vh * scale;
          var dx = (w - dw) / 2;
          var dy = (h - dh) / 2;

          ctx.save();
          ctx.translate(dx + dw, dy);
          ctx.scale(-1, 1);
          ctx.drawImage(video, 0, 0, vw, vh, 0, 0, dw, dh);
          ctx.restore();

          if (state.filter && state.filter.image && state.filter.image.complete) {
            ctx.drawImage(state.filter.image, 0, 0, w, h);
          }

          return true;
        }

        function drawNativePhotoToBlob(dataUrl) {
          return new Promise(function (resolve, reject) {
            var img = new Image();

            img.onload = function () {
              var w = work.width;
              var h = work.height;

              ctx.fillStyle = "#111";
              ctx.fillRect(0, 0, w, h);

              var iw = img.naturalWidth || img.width;
              var ih = img.naturalHeight || img.height;
              var scale = Math.max(w / iw, h / ih);
              var dw = iw * scale;
              var dh = ih * scale;
              var dx = (w - dw) / 2;
              var dy = (h - dh) / 2;

              ctx.save();
              ctx.drawImage(img, 0, 0, iw, ih, dx, dy, dw, dh);
              ctx.restore();

              if (state.filter && state.filter.image && state.filter.image.complete) {
                ctx.drawImage(state.filter.image, 0, 0, w, h);
              }

              work.toBlob(
                function (blob) {
                  if (!blob) {
                    reject(new Error(isEnglish() ? "Image conversion failed." : "이미지 변환 실패"));
                    return;
                  }
                  resolve(blob);
                },
                "image/png",
                0.92
              );
            };

            img.onerror = function () {
              reject(new Error(isEnglish() ? "Failed to load the captured image." : "네이티브 촬영 이미지를 불러오지 못했습니다."));
            };

            img.src = dataUrl;
          });
        }

        function renderFilters() {
          var list = document.getElementById("filterList");
          list.innerHTML = "";
          filters.forEach(function (f, idx) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "pb-filter-btn" + (idx === 0 ? " is-active" : "");
            btn.setAttribute("data-filter", f.id);
            btn.innerHTML =
              '<span class="pb-filter-icon"><img src="' +
              f.src +
              '" alt="" /></span><span>' +
              f.label +
              "</span>";
            btn.addEventListener("click", function () {
              pickFilter(f, btn);
            });
            list.appendChild(btn);
            if (idx === 0) {
              pickFilter(f, btn);
            }
          });
        }

        function pickFilter(f, btn) {
          state.filter = f;
          state.filterPicked = true;
          frameOverlay.src = f.src;
          shutter.disabled = state.busy ? true : false;
          frameBadge.textContent = f.badge;
          document.getElementById("shutterHint").textContent = isEnglish()
            ? "Press the button to take a photo!"
            : "버튼을 눌러 촬영하세요!";
          document.querySelectorAll(".pb-filter-btn").forEach(function (b) {
            b.classList.remove("is-active");
          });
          btn.classList.add("is-active");
          if (!f.image) {
            f.image = new Image();
            f.image.src = f.src;
          }
        }

        function startNativeCameraMode() {
          state.nativeCamera = true;
          state.nativePreviewReady = false;
          video.hidden = true;
          nativePreview.hidden = false;
          showNativeNotice(
            isEnglish()
              ? "Preparing Temi native camera<br />Please wait"
              : "Temi 네이티브 카메라 준비 중입니다<br />잠시만 기다려 주세요"
          );
          shutter.disabled = true;
          document.getElementById("shutterHint").textContent = isEnglish()
            ? "Please wait until the Temi camera preview is ready."
            : "Temi 카메라 미리보기가 준비될 때까지 기다려 주세요.";

          if (hasNativePreviewBridge()) {
            window.TemiBridge.startCameraPreview();
          }
        }

        function startWebCameraMode() {
          state.webCameraReady = false;

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            hideNativeNotice();
            return;
          }

          navigator.mediaDevices
            .getUserMedia({
              video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
              audio: false,
            })
            .then(function (stream) {
              video.srcObject = stream;
              video.onloadedmetadata = function () {
                state.webCameraReady = true;
                shutter.disabled = !state.filterPicked;
                document.getElementById("shutterHint").textContent = isEnglish()
                  ? "Camera is ready. Press the button to take 4 photos."
                  : "카메라 준비 완료. 버튼을 누르면 4컷 촬영을 시작합니다.";
              };
            })
            .catch(function () {
              alert(
                isEnglish()
                  ? "Camera permission is required. Please allow it in your settings."
                  : "카메라 권한이 필요합니다. 브라우저·WebView 설정에서 허용해 주세요."
              );
            });
        }

        function startCamera() {
          // Android WebView의 TemiBridge 주입이 늦을 수 있으므로 잠깐 기다렸다가 판단한다.
          var tries = 0;
          var timer = setInterval(function () {
            tries += 1;

            if (hasNativeCameraBridge()) {
              clearInterval(timer);
              startNativeCameraMode();
              return;
            }

            if (tries >= 10) {
              clearInterval(timer);
              startWebCameraMode();
            }
          }, 300);
        }

        function postSession() {
          return fetch("/api/photo-booth/sessions", { method: "POST" }).then(function (r) {
            if (!r.ok) throw new Error("session");
            return r.json();
          });
        }

        function postPhoto(token, blob) {
          var fd = new FormData();
          fd.append("file", blob, "capture.png");
          return fetch("/api/photo-booth/sessions/" + encodeURIComponent(token) + "/photos", {
            method: "POST",
            body: fd,
          }).then(function (r) {
            if (!r.ok) throw new Error("upload");
            return r.json();
          });
        }

        document.getElementById("btnLangKo").addEventListener("click", function () {
          window.TemiI18n && window.TemiI18n.setLang && window.TemiI18n.setLang("ko");
        });
        document.getElementById("btnLangEn").addEventListener("click", function () {
          window.TemiI18n && window.TemiI18n.setLang && window.TemiI18n.setLang("en");
        });

        document.getElementById("btnNotify").addEventListener("click", function () {
          alert(isEnglish() ? "No new notifications." : "새 알림이 없습니다.");
        });

        function openResult(previewDataUrl) {
          capturedImg.src = previewDataUrl;
          resultView.hidden = false;
          resultView.classList.add("is-open");
        }

        function closeResult() {
          resultView.classList.remove("is-open");
          resultView.hidden = true;
          qrImg.hidden = true;
          qrImg.removeAttribute("src");
          if (previewUrl) {
            URL.revokeObjectURL(previewUrl);
            previewUrl = null;
          }
          capturedImg.removeAttribute("src");
          uploadStatus.hidden = true;
        }

        function processCapturedBlob(blob) {
          if (!blob) {
            state.busy = false;
            shutter.disabled = false;
            return;
          }

          if (previewUrl) URL.revokeObjectURL(previewUrl);
          previewUrl = URL.createObjectURL(blob);
          openResult(previewUrl);
          uploadStatus.hidden = false;
          uploadStatus.textContent = isEnglish() ? "Uploading..." : "업로드 중…";

          postSession()
            .then(function (data) {
              return postPhoto(data.token, blob).then(function () {
                return data.token;
              });
            })
            .then(function (token) {
              qrImg.src =
                "/api/photo-booth/sessions/" +
                encodeURIComponent(token) +
                "/qr.png?t=" +
                Date.now();
              qrImg.hidden = false;
              uploadStatus.textContent = isEnglish()
                ? "Scan the QR code to download your photo."
                : "QR을 스캔해 폰으로 사진을 받으세요.";
              notifyMobilePhotoResult(token);
            })
            .catch(function (e) {
              uploadStatus.textContent = isEnglish()
                ? "Upload failed. Please try again."
                : "업로드 실패. 다시 촬영해 주세요.";
              alert(e.message || (isEnglish() ? "Something went wrong." : "오류가 났습니다."));
            })
            .finally(function () {
              state.busy = false;
              state.fourCutActive = false;
              shutter.disabled = false;
              document.getElementById("shutterHint").textContent = isEnglish()
                ? "Camera is ready. Press the button to take 4 photos."
                : "카메라 준비 완료. 버튼을 누르면 4컷 촬영을 시작합니다.";
            });
        }

        function notifyMobilePhotoResult(token) {
          if (!token) return;

          var socketUrl = window.location.protocol + "//" + window.location.hostname + ":3000";
          var viewUrl =
            window.location.origin +
            "/mobile/app/photo/receive?token=" +
            encodeURIComponent(token);

          function emitResult() {
            try {
              var s = window.io(socketUrl, {
                query: { room: "photo" },
                transports: ["websocket", "polling"],
              });

              s.on("connect", function () {
                s.emit("temi:photo_result", {
                  token: token,
                  viewUrl: viewUrl,
                  source: "temi-photo-capture",
                  createdAt: new Date().toISOString(),
                });

                setTimeout(function () {
                  s.disconnect();
                }, 700);
              });
            } catch (e) {
              console.warn("photo_result emit failed", e);
            }
          }

          if (window.io) {
            emitResult();
            return;
          }

          var script = document.createElement("script");
          script.src = socketUrl + "/socket.io/socket.io.js";
          script.onload = emitResult;
          script.onerror = function () {
            console.warn("Socket.IO client load failed");
          };
          document.head.appendChild(script);
        }

        function captureWebFrameBlob() {
          return new Promise(function (resolve, reject) {
            if (!video.videoWidth) {
              reject(new Error(isEnglish() ? "Please wait until the camera is ready." : "카메라가 준비될 때까지 잠시만 기다려 주세요."));
              return;
            }

            if (!drawVideoFrame()) {
              reject(new Error(isEnglish() ? "Failed to capture camera frame." : "카메라 프레임을 가져오지 못했습니다."));
              return;
            }

            work.toBlob(
              function (blob) {
                if (!blob) {
                  reject(new Error(isEnglish() ? "Image conversion failed." : "이미지 변환 실패"));
                  return;
                }
                resolve(blob);
              },
              "image/png",
              0.92
            );
          });
        }

        function takeOneShot() {
          flash.classList.add("is-on");

          setTimeout(function () {
            flash.classList.remove("is-on");

            if (state.nativeCamera || hasNativeCameraBridge()) {
              if (!hasNativeCameraBridge()) {
                handleFourCutError(new Error(isEnglish() ? "Temi native camera bridge was not found." : "Temi 네이티브 카메라 연결을 찾지 못했습니다."));
                return;
              }

              if (!state.nativePreviewReady) {
                handleFourCutError(new Error(isEnglish() ? "Please wait until the Temi camera preview is ready." : "Temi 카메라 준비가 끝날 때까지 기다려 주세요."));
                return;
              }

              uploadStatus.hidden = false;
              uploadStatus.textContent = isEnglish()
                ? "Taking photo " + state.fourCutIndex + " of 4..."
                : state.fourCutIndex + "/4 컷 촬영 중…";

              window.TemiBridge.takePhoto();
              return;
            }

            if (!state.webCameraReady) {
              handleFourCutError(new Error(isEnglish() ? "Please wait until the camera is ready." : "카메라 준비가 끝날 때까지 기다려 주세요."));
              return;
            }

            captureWebFrameBlob()
              .then(function (blob) {
                handleFourCutShot(blob);
              })
              .catch(handleFourCutError);
          }, 120);
        }

        function startFourCutCapture() {
          if (!state.filterPicked) {
            alert(isEnglish() ? "Please select a frame first." : "먼저 프레임을 선택해 주세요.");
            return;
          }

          if (state.busy) {
            return;
          }

          if ((state.nativeCamera || hasNativeCameraBridge()) && !state.nativePreviewReady) {
            alert(isEnglish() ? "Please wait until the Temi camera preview is ready." : "Temi 카메라 준비가 끝날 때까지 기다려 주세요.");
            return;
          }

          if (!(state.nativeCamera || hasNativeCameraBridge()) && !state.webCameraReady) {
            alert(isEnglish() ? "Please wait until the camera is ready." : "카메라 준비가 끝날 때까지 기다려 주세요.");
            return;
          }

          state.busy = true;
          state.fourCutActive = true;
          state.fourCutShots = [];
          state.fourCutIndex = 1;
          shutter.disabled = true;
          closeResult();

          uploadStatus.hidden = false;
          uploadStatus.textContent = isEnglish()
            ? "Starting 4-cut photo..."
            : "4컷 촬영을 시작합니다…";

          document.getElementById("shutterHint").textContent = isEnglish()
            ? "Taking 4 photos. Please wait."
            : "4컷 촬영 중입니다. 잠시만 기다려 주세요.";

          takeOneShot();
        }

        function handleFourCutShot(blob) {
          if (!state.fourCutActive) {
            return;
          }

          state.fourCutShots.push(blob);

          if (state.fourCutShots.length >= 4) {
            uploadStatus.hidden = false;
            uploadStatus.textContent = isEnglish()
              ? "Compositing 4-cut photo..."
              : "네컷 사진 합성 중…";

            composeFourCutBlob(state.fourCutShots)
              .then(function (fourCutBlob) {
                processCapturedBlob(fourCutBlob);
              })
              .catch(handleFourCutError);

            return;
          }

          state.fourCutIndex = state.fourCutShots.length + 1;
          uploadStatus.hidden = false;
          uploadStatus.textContent = isEnglish()
            ? "Next photo in 3 seconds... (" + state.fourCutIndex + "/4)"
            : "3초 후 다음 컷을 촬영합니다… (" + state.fourCutIndex + "/4)";

          setTimeout(takeOneShot, 3000);
        }

        function handleFourCutError(error) {
          state.busy = false;
          state.fourCutActive = false;
          state.fourCutShots = [];
          state.fourCutIndex = 0;
          shutter.disabled = false;

          var msg = error && error.message ? error.message : (isEnglish() ? "Photo capture failed." : "촬영에 실패했습니다.");
          uploadStatus.hidden = false;
          uploadStatus.textContent = msg;
          alert(msg);
        }

        function loadImageFromBlob(blob) {
          return new Promise(function (resolve, reject) {
            var url = URL.createObjectURL(blob);
            var img = new Image();

            img.onload = function () {
              resolve({ img: img, url: url });
            };

            img.onerror = function () {
              URL.revokeObjectURL(url);
              reject(new Error(isEnglish() ? "Failed to load captured photo." : "촬영 이미지를 불러오지 못했습니다."));
            };

            img.src = url;
          });
        }

        function composeFourCutBlob(blobs) {
          return Promise.all(blobs.map(loadImageFromBlob)).then(function (items) {
            return new Promise(function (resolve, reject) {
              var out = document.createElement("canvas");

              // 최종 결과물 사이즈: 세로형 인생네컷
              var outW = 900;
              var outH = 1600;

              // 예전 결과물 UI와 비슷한 노란 배경 + 상단 타이틀 + 4컷 레이아웃
              var bgColor = "#ffe68a";
              var titleColor = "#111827";
              var sideMargin = 48;
              var topTitleY = 55;
              var subTitleY = 95;
              var photoStartY = 124;
              var bottomTextArea = 54;
              var gap = 4;
              var slotW = outW - sideMargin * 2;
              var slotH = Math.floor((outH - photoStartY - bottomTextArea - gap * 3 - 18) / 4);
              var outCtx = out.getContext("2d");

              out.width = outW;
              out.height = outH;

              // 전체 노란 배경
              outCtx.fillStyle = bgColor;
              outCtx.fillRect(0, 0, outW, outH);

              // 상단 타이틀
              outCtx.fillStyle = titleColor;
              outCtx.textAlign = "center";
              outCtx.textBaseline = "middle";
              outCtx.font = "900 52px system-ui, -apple-system, BlinkMacSystemFont, sans-serif";
              outCtx.fillText("POKEMON FESTIVAL", outW / 2, topTitleY);

              outCtx.font = "900 31px system-ui, -apple-system, BlinkMacSystemFont, sans-serif";
              outCtx.fillText("TEMI FOUR CUT", outW / 2, subTitleY);

              // 사진 영역 바깥 흰색 받침/테두리 느낌
              var frameX = sideMargin - 12;
              var frameY = photoStartY - 12;
              var frameW = slotW + 24;
              var frameH = slotH * 4 + gap * 3 + 24;

              outCtx.fillStyle = "#ffffff";
              outCtx.fillRect(frameX, frameY, frameW, frameH);

              items.forEach(function (item, index) {
                var img = item.img;
                var iw = img.naturalWidth || img.width;
                var ih = img.naturalHeight || img.height;
                var x = sideMargin;
                var y = photoStartY + index * (slotH + gap);

                // cover 방식으로 꽉 채우기
                var scale = Math.max(slotW / iw, slotH / ih);
                var dw = iw * scale;
                var dh = ih * scale;
                var dx = x + (slotW - dw) / 2;
                var dy = y + (slotH - dh) / 2;

                outCtx.save();
                outCtx.beginPath();
                outCtx.rect(x, y, slotW, slotH);
                outCtx.clip();
                outCtx.drawImage(img, dx, dy, dw, dh);
                outCtx.restore();

                // 사진과 사진 사이가 흰색으로 뜨지 않도록 얇은 어두운 경계
                outCtx.lineWidth = 2;
                outCtx.strokeStyle = "rgba(7, 25, 53, 0.55)";
                outCtx.strokeRect(x, y, slotW, slotH);
              });

              // 하단 날짜
              var now = new Date();
              var dateText = now.toLocaleString("ko-KR", {
                year: "numeric",
                month: "numeric",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit",
                second: "2-digit",
                hour12: true,
              });

              outCtx.fillStyle = "#111827";
              outCtx.textAlign = "center";
              outCtx.textBaseline = "middle";
              outCtx.font = "900 26px system-ui, -apple-system, BlinkMacSystemFont, sans-serif";
              outCtx.fillText(dateText, outW / 2, outH - 24);

              items.forEach(function (item) {
                URL.revokeObjectURL(item.url);
              });

              out.toBlob(
                function (blob) {
                  if (!blob) {
                    reject(new Error(isEnglish() ? "4-cut conversion failed." : "네컷 이미지 변환 실패"));
                    return;
                  }
                  resolve(blob);
                },
                "image/png",
                0.95
              );
            });
          });
        }

        window.addEventListener("temi:photo-preview", function (event) {
          var detail = event.detail || {};
          if (!detail.dataUrl) return;

          nativePreview.src = detail.dataUrl;
          nativePreview.hidden = false;
          state.nativePreviewReady = true;
          hideNativeNotice();

          if (!state.busy && state.filterPicked) {
            shutter.disabled = false;
          }

          document.getElementById("shutterHint").textContent = isEnglish()
            ? "Temi camera is ready. Press the button to take 4 photos."
            : "Temi 카메라 준비 완료. 버튼을 누르면 4컷 촬영을 시작합니다.";
        });

        window.addEventListener("temi:photo-result", function (event) {
          var detail = event.detail || {};

          if (!detail.ok) {
            if (detail.message) {
              uploadStatus.hidden = false;
              uploadStatus.textContent = detail.message;
            }

            if (
              detail.message &&
              (detail.message.indexOf("권한 요청") >= 0 ||
                detail.message.indexOf("촬영 시작") >= 0 ||
                detail.message.indexOf("촬영 중") >= 0 ||
                detail.message.indexOf("권한 승인") >= 0 ||
                detail.message.indexOf("미리보기") >= 0 ||
                detail.message.indexOf("준비 완료") >= 0 ||
                detail.message.indexOf("preview") >= 0)
            ) {
              return;
            }

            handleFourCutError(new Error(detail.message || (isEnglish() ? "Temi photo capture failed." : "Temi 사진 촬영 실패")));
            return;
          }

          if (!detail.dataUrl) {
            handleFourCutError(new Error(isEnglish() ? "No image data received." : "촬영 이미지 데이터가 없습니다."));
            return;
          }

          drawNativePhotoToBlob(detail.dataUrl)
            .then(function (blob) {
              handleFourCutShot(blob);
            })
            .catch(handleFourCutError);
        });

        shutter.addEventListener("click", startFourCutCapture);

        document.getElementById("btnRetake").addEventListener("click", function () {
          closeResult();
          state.fourCutActive = false;
          state.fourCutShots = [];
          state.fourCutIndex = 0;
          if (state.filterPicked && (!state.nativeCamera || state.nativePreviewReady)) {
            shutter.disabled = false;
          }
        });

        document.addEventListener("contextmenu", function (e) {
          e.preventDefault();
        });

        renderFilters();
        startCamera();
      })();
    </script>
  </body>
</html>
