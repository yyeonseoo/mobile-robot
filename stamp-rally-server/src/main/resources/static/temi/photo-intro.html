<!DOCTYPE html>
<html lang="ko" class="temi-landing-doc">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta
      name="viewport"
      content="width=1920, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>포토부스 안내 | 포켓몬 페스티벌</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home-landing.css" />
    <link rel="stylesheet" href="photo-intro-page.css" />
    <script src="js/i18n.js" defer></script>
  </head>
  <body class="temi-landing temi-photo-intro">
    <header class="tl-header">
      <a class="tl-brand" href="index.html">Pokemon Exhibition</a>
      <nav class="tl-nav" aria-label="주요 메뉴">
        <a href="rally-qr.html">Stamp Rally</a>
        <a href="guide.html">Map</a>
        <a href="photo-intro.html" class="is-active">Photo Booth</a>
        <a href="events.html">Events</a>
      </nav>
      <div class="tl-header-actions">
        <button type="button" class="tl-icon-btn" id="btnNotify" aria-label="알림">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <a class="tl-icon-btn" href="index.html" aria-label="메인으로">
          <span class="material-symbols-outlined">home</span>
        </a>
      </div>
    </header>

    <main class="temi-scroll pi-main" role="application">
      <div class="pi-hero-text">
        <h1 data-i18n="photo.title">인생네컷 포토부스</h1>
        <p data-i18n="photo.subtitle">포켓몬 프레임과 함께 오늘의 추억을 남겨 보세요!</p>
      </div>

      <div class="pi-stage">
        <div class="pi-preview" aria-hidden="true">
          <div class="pi-preview-bg"></div>
          <div class="pi-preview-inner">
            <div class="pi-preview-icon">📸</div>
            <p>4-CUT PHOTO BOOTH</p>
            <span class="pi-preview-badge"><span></span> READY</span>
          </div>
        </div>

        <div class="pi-side">
          <div class="pi-tips" aria-label="촬영 안내">
            <div class="pi-tip">
              <span class="pi-tip-num pi-tip-num--1">1</span>
              <div>
                <h3 data-i18n="photo.step1.title">프레임 선택</h3>
                <p data-i18n="photo.step1.body">이브이, 피카츄, 잠만보 테마 중 마음에 드는 프레임을 골라요.</p>
              </div>
            </div>
            <div class="pi-tip">
              <span class="pi-tip-num pi-tip-num--2">2</span>
              <div>
                <h3 data-i18n="photo.step2.title">촬영하기</h3>
                <p data-i18n="photo.step2.body">화면을 보고 셔터 버튼을 눌러 한 장을 남겨요.</p>
              </div>
            </div>
            <div class="pi-tip">
              <span class="pi-tip-num pi-tip-num--3">3</span>
              <div>
                <h3 data-i18n="photo.step3.title">QR로 받기</h3>
                <p data-i18n="photo.step3.body">촬영 후 QR을 스캔하면 휴대폰으로 사진을 받을 수 있어요.</p>
              </div>
            </div>
          </div>

          <div class="pi-actions">
            <button type="button" class="pi-btn-go" id="btnGo" aria-label="촬영 시작">
              <span class="material-symbols-outlined">photo_camera</span>
              <span data-i18n="photo.go">촬영할래요!</span>
            </button>
            <button type="button" class="pi-btn-cancel" id="btnCancel" aria-label="메인으로">
              <span class="material-symbols-outlined">close</span>
              <span data-i18n="photo.cancel">괜찮아요</span>
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="pb-help-footer">
      <div class="help-text">
        <span class="material-symbols-outlined">info</span>
        <span data-i18n="help.text">도움이 필요하신가요? 옆에 있는 스태프에게 문의해 주세요.</span>
      </div>
      <div class="pb-lang-btns">
        <button type="button" id="btnLangKo">KOREAN</button>
        <button type="button" class="is-muted" id="btnLangEn">ENGLISH</button>
      </div>
    </footer>

    <script>
      document.getElementById("btnGo").addEventListener("click", function () {
        location.href = "photo-capture.html";
      });
      document.getElementById("btnCancel").addEventListener("click", function () {
        location.href = "index.html";
      });
      document.getElementById("btnNotify").addEventListener("click", function () {
        alert((window.TemiI18n && window.TemiI18n.getLang && window.TemiI18n.getLang() === "en") ? "No new notifications." : "새 알림이 없습니다.");
      });
      document.getElementById("btnLangKo").addEventListener("click", function () {
        window.TemiI18n && window.TemiI18n.setLang && window.TemiI18n.setLang("ko");
      });
      document.getElementById("btnLangEn").addEventListener("click", function () {
        window.TemiI18n && window.TemiI18n.setLang && window.TemiI18n.setLang("en");
      });
      document.addEventListener("contextmenu", function (e) {
        e.preventDefault();
      });
    </script>
  </body>
</html>
