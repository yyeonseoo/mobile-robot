<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1200" />
    <title>스탬프 QR — 현장 배치용</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <style>
      .grid4 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
        width: 100%;
      }
      .cell {
        background: var(--bg-panel);
        border-radius: var(--radius);
        padding: 20px;
        text-align: center;
        border: 1px solid #2a3544;
      }
      .cell .tag {
        font-size: 1.25rem;
        margin-bottom: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <header class="top-bar">
        <div>
          <h1>스탬프 장소 QR (데모)</h1>
          <p class="muted">각 QR은 해당 코드로 모바일 랠리 페이지를 열고 자동 적립을 시도합니다.</p>
        </div>
        <a class="back-link" href="rally-qr.html">← 랠리 연결</a>
      </header>
      <div class="grid4" id="grid"></div>
    </div>
    <script>
      var codes = ["RALLY-1", "RALLY-2", "RALLY-3", "RALLY-4"];
      window.addEventListener("load", function () {
        var g = document.getElementById("grid");
        codes.forEach(function (code) {
          var cell = document.createElement("div");
          cell.className = "cell";
          var tag = document.createElement("div");
          tag.className = "tag";
          tag.textContent = code;
          var host = document.createElement("div");
          host.style.display = "inline-block";
          host.style.background = "#fff";
          host.style.padding = "8px";
          host.style.borderRadius = "8px";
          cell.appendChild(tag);
          cell.appendChild(host);
          g.appendChild(cell);
          var url = location.origin + "/mobile/rally.html?claim=" + encodeURIComponent(code);
          if (window.QRCode) {
            new QRCode(host, { text: url, width: 200, height: 200 });
          }
        });
      });
    </script>
  </body>
</html>
