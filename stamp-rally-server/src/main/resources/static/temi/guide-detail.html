<!DOCTYPE html>
<html lang="ko" class="temi-landing-doc">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=1920, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>전시 상세</title>
    <link rel="stylesheet" href="home-landing.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  </head>
  <body class="temi-landing temi-legacy">
    <div class="stage temi-scroll">
      <header class="top-bar">
        <a class="back-link" href="guide.html">← 목록</a>
        <a class="back-link" href="index.html">메인</a>
      </header>
      <div class="detail-grid" style="flex: 1; min-height: 0">
        <section class="detail-main" id="detailMain">
          <p class="muted">불러오는 중…</p>
        </section>
        <aside class="qr-panel" style="flex-direction: column; align-items: flex-start">
          <strong style="font-size: 1.2rem">스탬프 랠리 QR</strong>
          <div class="qr-host" style="margin-top: 12px"><div id="qrSync"></div></div>
          <p class="hint" style="margin-top: 16px">
            휴대폰 기본 카메라로 QR을 스캔하면 해당 구역의 스탬프 랠리 페이지가 열리고 자동 적립을 시도합니다.
          </p>
        </aside>
      </div>
    </div>
    <script>
      function origin() {
        return location.origin;
      }
      function qs(name) {
        var m = new RegExp("[?&]" + name + "=([^&]*)").exec(location.search);
        return m ? decodeURIComponent(m[1].replace(/\+/g, " ")) : "";
      }
      function getStampClaim(ex) {
        var text = [
          ex && ex.id,
          ex && ex.zone,
          ex && ex.name,
          ex && ex.locationText
        ]
          .join(" ")
          .toLowerCase()
          .replace(/\s+/g, "");

        if (/rally-1|stamp1|zonea|a존|a구역|1구역|\ba\b/.test(text)) return "RALLY-1";
        if (/rally-2|stamp2|zoneb|b존|b구역|2구역|\bb\b/.test(text)) return "RALLY-2";
        if (/rally-3|stamp3|zonec|c존|c구역|3구역|\bc\b/.test(text)) return "RALLY-3";
        if (/rally-4|stamp4|zoned|d존|d구역|4구역|\bd\b/.test(text)) return "RALLY-4";

        return "RALLY-1";
      }
      var id = qs("id");
      fetch(origin() + "/api/exhibitions/" + encodeURIComponent(id))
        .then(function (r) {
          if (!r.ok) throw new Error("not found");
          return r.json();
        })
        .then(function (ex) {
          var el = document.getElementById("detailMain");
          el.innerHTML =
            "<h2>" +
            ex.name +
            "</h2>" +
            '<div class="detail-meta"><span>위치: ' +
            ex.locationText +
            "</span><span>구역: " +
            ex.zone +
            "</span><span>예상 이동: 약 " +
            ex.estimatedMinutes +
            '분</span><span>방향: ' +
            ex.directionHint +
            "</span></div>" +
            '<p class="detail-body">' +
            ex.description +
            "</p>" +
            (ex.relatedEvent
              ? '<p class="detail-body" style="margin-top:16px"><strong>관련 이벤트:</strong> ' +
                ex.relatedEvent +
                "</p>"
              : "");
          document.title = ex.name + " — 상세";
          var host = document.getElementById("qrSync");
          host.innerHTML = "";
          var claim = getStampClaim(ex);
          var stampUrl = origin() + "/mobile/app/rally?claim=" + encodeURIComponent(claim);
          if (window.QRCode) {
            new QRCode(host, {
              text: stampUrl,
              width: 220,
              height: 220,
            });
          }
        })
        .catch(function () {
          document.getElementById("detailMain").innerHTML =
            "<p>전시 정보를 찾을 수 없습니다.</p>";
        });
    </script>
  </body>
</html>
