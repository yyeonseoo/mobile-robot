server.port=8080
spring.application.name=stamp-rally-server

spring.datasource.url=jdbc:h2:mem:stamprally;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# 정적 리소스 캐시 끔(개발): CSS/HTML 수정이 바로 보이게
spring.web.resources.cache.period=0
# period=0만으로도 되지만, 일부 브라우저/웹뷰는 Cache-Control이 약하면 옛 파일을 붙잡습니다.
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
