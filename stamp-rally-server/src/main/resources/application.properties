server.port=8080
spring.application.name=stamp-rally-server

# 기본 개발 프로필: application-dev.properties → 소스 폴더 static 우선 서빙(CSS 즉시 반영)
# 배포 JAR만 쓸 때는 실행 옵션에 -Dspring.profiles.active=prod 등으로 바꾸세요.
spring.profiles.default=dev

spring.datasource.url=jdbc:h2:mem:stamprally;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# 정적 리소스 캐시 끔(개발): CSS/HTML 수정이 바로 보이게
spring.web.resources.cache.period=0
# period=0만으로도 되지만, 일부 브라우저/웹뷰는 Cache-Control이 약하면 옛 파일을 붙잡습니다.
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.cache.cachecontrol.no-store=true

# true: /temi/index.html 응답 시 style/home CSS 링크에 매번 다른 ?v= 를 붙여 캐시 무력화 (개발 기본)
app.temi-index-bust-asset-cache=true
# 위가 false일 때만 사용 (배포 등)
app.asset-version=1

# 역프록시(Nginx 등) 뒤에서 X-Forwarded-* 로 원본 호스트·HTTPS 반영
server.forward-headers-strategy=framework

# 포토부스: 휴대폰 QR에 들어갈 공개 URL (비우면 요청 Host/Forwarded 사용)
app.photo-booth.public-base-url=
# 비우면 시스템 임시 폴더 아래에 세션 디렉터리 생성
app.photo-booth.storage-dir=

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
